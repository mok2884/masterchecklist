<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SIP電話テスト</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jssip/3.9.1/jssip.min.js"></script>
</head>
<body>
    <p id="status">確認中...</p>
    <script>
        window.onload = function() {
            if (typeof JsSIP !== 'undefined') {
                document.getElementById('status').innerText = '1：部品の読み込みに成功しました！';
            } else {
                document.getElementById('status').innerText = '1：失敗。まだ部品が読み込めていません。';
            }
        };
    </script>
</body>
</html>
