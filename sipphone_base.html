<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SIP電話 - 公式版</title>
    <!-- 林さんが見つけてくれた公式サイトのアドレス -->
    <script src="https://jssip.net/download/releases/jssip-3.10.0.min.js"></script>
</head>
<body>
    <div style="border: 2px solid #27ae60; padding: 15px; background: #fff;">
        <p>【更新メモ】2026/05/01 07:30 更新（公式サイト直結版）</p>
        <p id="check" style="font-size: 20px;">判定中...</p>
    </div>

    <script>
        window.onload = function() {
            // サーバーの機嫌が直るのを祈りつつ、3秒待って判定
            setTimeout(function() {
                if (typeof JsSIP !== 'undefined') {
                    document.getElementById('check').innerText = '手順2：成功！！！ついに本物が降臨しました！';
                    document.getElementById('check').style.color = 'green';
                    document.getElementById('check').style.fontWeight = 'bold';
                } else {
                    document.getElementById('check').innerText = 'まだ失敗。サーバーの500エラーが長引いているかも…';
                    document.getElementById('check').style.color = 'red';
                }
            }, 3000);
        };
    </script>
</body>
</html>
