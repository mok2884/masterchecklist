<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SIP電話 - 最終完成形</title>
    <!-- 林さんが見つけてくれた公式サイトのアドレス -->
    <script src="https://jssip.net/download/releases/jssip-3.10.0.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .phone-card { background: #16213e; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 320px; border: 1px solid #0f3460; text-align: center; }
        .status { padding: 15px; margin-bottom: 25px; border-radius: 12px; font-weight: bold; transition: all 0.5s; }
        .online { background: #2ecc71; color: #fff; box-shadow: 0 0 15px #2ecc71; }
        .offline { background: #e74c3c; color: #fff; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: none; background: #0f3460; color: #fff; font-size: 1.2em; text-align: center; }
        button { width: 100%; padding: 15px; background: #e94560; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .hangup { background: #533483; }
        .info { font-size: 10px; color: #4e6e8e; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="phone-card">
    <h2 style="margin-top: 0;">LINPHONE WEB</h2>
    <div id="status" class="status offline">接続中...</div>
    
    <input type="text" id="dest" placeholder="相手の番号 (例: odoridomu)">
    <button onclick="makeCall()">📞 発信 (Call)</button>
    <button class="hangup" onclick="hangup()">終了 (Hangup)</button>

    <div class="info">
        User: mok2884<br>
        Server: sip.linphone.org<br>
        【更新メモ】2026/05/01 08:30 最終完成
    </div>
</div>

<script>
    var ua;

    window.onload = function() {
        // 林さんの設定をここに完璧に埋め込みました
        var socket = new JsSIP.WebSocketInterface('wss://sip.linphone.org:4443'); // Linphoneの標準WSSポート
        var configuration = {
            sockets: [socket],
            uri: 'sip:mok2884@sip.linphone.org',
            password: 'linphonetech1242'
        };

        try {
            ua = new JsSIP.UA(configuration);

            ua.on('connected', function() {
                document.getElementById('status').innerText = '✅ サーバー接続完了';
                document.getElementById('status').className = 'status online';
            });

            ua.on('registrationFailed', function(e) {
                document.getElementById('status').innerText = '❌ 接続失敗: ' + e.cause;
                document.getElementById('status').className = 'status offline';
            });

            ua.start();
        } catch (e) {
            document.getElementById('status').innerText = 'エラー発生';
            console.error(e);
        }
    };

    function makeCall() {
        var dest = document.getElementById('dest').value;
        if (!dest) { alert("相手のIDを入れてね！"); return; }
        
        // linphone.org宛に発信する設定
        ua.call('sip:' + dest + '@sip.linphone.org', {
            mediaConstraints: { audio: true, video: false }
        });
    }

    function hangup() {
        ua.terminateSessions();
    }
</script>

</body>
</html>
