<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
body { background-color: #050505; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
.console { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; gap: 15px; }
.display-row { display: flex; gap: 20px; align-items: flex-end; }
.unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.label { color: #eee; font-weight: bold; font-size: 16px; font-family: sans-serif; }
.meter { position: relative; width: 280px; height: 150px; background-color: #fdfae1; overflow: hidden; border-radius: 4px; border: 1px solid #444; }
.scope { position: relative; width: 220px; height: 220px; background-color: #000; border: 1px solid #444; border-radius: 4px; }
.needle {
    position: absolute;
    top: 170px;
    left: 140px;
    width: 0;
    height: 145px;
    margin-top: -145px;
    transform-origin: bottom center;
    z-index: 10;
}

.needle::before {
    content: "";
    position: absolute;
    left: -3px;
    bottom: 0;
    width: 6px;
    height: 145px;
    background: #111;
    clip-path: polygon(
        33% 0%,
        67% 0%,
        100% 100%,
        0% 100%
    );
}
    
.controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; color: #aaa; margin-top: 10px; }
.knob-group { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 12px; }
select { background: #333; color: #fff; border: 1px solid #555; padding: 5px; border-radius: 4px; width: 200px; margin-bottom: 10px; }
input[type=range] { width: 130px; cursor: pointer; }
#btn { padding: 10px 30px; cursor: pointer; font-weight: bold; border-radius: 4px; border: none; background: #444; color: white; }
#btn.on { background: #d00; }
canvas { position: absolute; top: 0; left: 0; z-index: 5; }
</style>
</head>
<body>
<div class="console">
    <div class="knob-group">
        <label style="color:#0f0">SELECT INPUT DEVICE:</label>
        <select id="micSelect"><option value="">-- Device List --</option></select>
    </div>

<div class="display-row">
    <div class="unit" id="vuGroup">
   <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:10px;">
    <input type="range" id="vuGainCoarse" min="0" max="40" step="1" value="20">
    <input type="range" id="vuGainFine" min="-1" max="1" step="0.1" value="0">
    <span id="vuVal">0.0 dB</span>
</div>

<div style="display:flex; gap:20px; align-items:flex-start;">

    <div class="unit">
        <div class="label">L-VU</div>
        <div class="meter">
            <canvas id="cvsL" width="280" height="150"></canvas>
            <div id="ndlL" class="needle"></div>
        </div>
    </div>

    <div class="unit">
        <div class="label">R-VU</div>
        <div class="meter">
            <canvas id="cvsR" width="280" height="150"></canvas>
            <div id="ndlR" class="needle"></div>
        </div>
    </div>

</div>
</div>
   <div class="unit">

        <input type="range" id="scopeGain" min="0.1" max="5.0" step="0.1" value="1.0">
        <span id="scopeVal">x1.0</span>

        <div class="label">PHASE SCOPE</div>

        <div class="scope">
            <canvas id="cvsScope" width="220" height="220"></canvas>
        </div>

    </div>

    <div class="unit">
        <div class="label">LOUDNESS</div>

        <div style="color:#0f0; margin-top:5px;" id="lkfsVal">-60.0 LKFS</div>

        <div style="font-size:12px; color:#aaa;">M　　S</div>

        <div style="display:flex; gap:10px; align-items:flex-end;">
            <div style="width:20px; height:180px; background:#222; position:relative;">
                <div id="barM" style="position:absolute; bottom:0; width:100%; height:10%; background:#0f0;"></div>
            </div>
            <div style="width:20px; height:180px; background:#222; position:relative;">
                <div id="barS" style="position:absolute; bottom:0; width:100%; height:10%; background:#0f0;"></div>
            </div>
        </div>

        <button id="lkfsStart">START</button>
    </div>

</div>
        </div>
    </div>
    
    



    
    <button id="btn">POWER OFF</button>
   
</div>

<script>
// Wake Lock 関連の処理
let wakeLock = null;
const requestWakeLock = async () => {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {}
};

// 初回操作時に Wake Lock を有効にする
document.body.addEventListener('pointerdown', () => { 
    if (!wakeLock) requestWakeLock(); 
}, { once: true });

document.addEventListener('visibilitychange', () => {
    if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
});

const VU_W = 280, VU_H = 150, CX = 140, CY = 170, R_BASE = 125;
const START_DEG = 145, END_DEG = 35;
const V_MIN = Math.pow(10, -20/20), V_MAX = Math.pow(10, 3/20);

function dbToAngle(db){
    const v = Math.pow(10, db/20);
    const norm = (v - V_MIN)/(V_MAX - V_MIN);
    return START_DEG + (norm * (END_DEG - START_DEG));
}

function drawVUBase(canvasId) {
    const ctx = document.getElementById(canvasId).getContext("2d");
    ctx.clearRect(0, 0, VU_W, VU_H);
    const mainMarks = [-20, -10, -7, -5, -3, -2, -1, 0, 1, 2, 3];
    for(let v = -20; v <= 3; v += 0.25) {
        const rad = (-dbToAngle(v)) * Math.PI / 180;
        const isRed = (v >= 0);
        const isMain = mainMarks.includes(v);
        ctx.beginPath();
        ctx.strokeStyle = isRed ? "#d00" : "#222";
        ctx.lineWidth = isMain ? 2.5 : 0.8;
        let tLen = isMain ? (isRed ? 15 : 10) : 5;
        ctx.moveTo(CX + Math.cos(rad) * R_BASE, CY + Math.sin(rad) * R_BASE);
        ctx.lineTo(CX + Math.cos(rad) * (R_BASE + tLen), CY + Math.sin(rad) * (R_BASE + tLen));
        ctx.stroke();
        if ([-20, -10, -7, -5, -3, 0, 3].includes(v)) {
            ctx.font = "bold 15px Arial"; ctx.fillStyle = isRed ? "#d00" : "#222"; ctx.textAlign = "center";
            ctx.fillText(Math.abs(v), CX + Math.cos(rad)*(R_BASE+28), CY + Math.sin(rad)*(R_BASE+28)+5);
        }
    }
}
drawVUBase("cvsL"); drawVUBase("cvsR");

const micSelect = document.getElementById('micSelect');
const btn = document.getElementById("btn");
let audioCtx, stream, currentL = START_DEG, currentR = START_DEG;
    let bufM = [], bufS = [];
let valM = -60, valS = -60;
let lkfsOn = false;

async function getDevices() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    micSelect.innerHTML = '';
    devices.filter(d => d.kind === 'audioinput').forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.text = d.label || `Microphone ${micSelect.length + 1}`;
        micSelect.appendChild(opt);
    });
}

navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
    s.getTracks().forEach(t => t.stop());
    getDevices();
});

btn.onclick = async () => {
    if (audioCtx) { audioCtx.close(); audioCtx = null; btn.innerText = "POWER OFF"; btn.classList.remove("on"); return; }
    
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const constraints = { 
        audio: { 
            deviceId: micSelect.value ? { exact: micSelect.value } : undefined,
            channelCount: { exact: 2 }, 
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
        } 
    };
    
    try {
        stream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(e) {
        console.log("ステレオ強制リトライ");
        constraints.audio.channelCount = { ideal: 2 };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
    }
    
    btn.innerText = "POWER ON"; btn.classList.add("on");
    
    const src = audioCtx.createMediaStreamSource(stream);
    const splitter = audioCtx.createChannelSplitter(2);
    const anaL = audioCtx.createAnalyser(), anaR = audioCtx.createAnalyser();
    const gainNode = audioCtx.createGain();
    
    anaL.fftSize = anaR.fftSize = 1024;
    src.connect(gainNode); gainNode.gain.value = 1; gainNode.connect(splitter);
    splitter.connect(anaL, 0); splitter.connect(anaR, 1);

    const bufL = new Float32Array(1024), bufR = new Float32Array(1024);
    const scopeCtx = document.getElementById("cvsScope").getContext("2d");
    
    const vuWin = Math.floor(audioCtx.sampleRate * 0.135), vuBufL = [], vuBufR = [];

    let lastX = 110, lastY = 110;

    function loop() {
        if (!audioCtx) return;
        const coarse = parseFloat(document.getElementById("vuGainCoarse").value);
const fine   = parseFloat(document.getElementById("vuGainFine").value);
const sG     = parseFloat(document.getElementById("scopeGain").value);

// 合算
const totalDb = (coarse - 20) + fine;

// ゲイン反映
gainNode.gain.value = Math.pow(10, totalDb / 20);

// 表示
document.getElementById("vuVal").innerText =
  (totalDb >= 0 ? "+" : "") + totalDb.toFixed(1) + " dB";
        document.getElementById("scopeVal").innerText = "x" + sG.toFixed(1);

        anaL.getFloatTimeDomainData(bufL); anaR.getFloatTimeDomainData(bufR);
        
let sum = 0;
for (let i = 0; i < bufL.length; i++) {
    const m = (bufL[i] + bufR[i]) * 0.5;
    sum += m * m;
}
const rms = Math.sqrt(sum / bufL.length) || 0.000001;

bufM.push(rms);
bufS.push(rms);

if (bufM.length > 20) bufM.shift();      // 約0.4秒
if (bufS.length > 150) bufS.shift();     // 約3秒

const avgM = bufM.reduce((a,b)=>a+b,0)/bufM.length;
const avgS = bufS.reduce((a,b)=>a+b,0)/bufS.length;

const dbM = 20 * Math.log10(avgM);
const dbS = 20 * Math.log10(avgS);

valM += (dbM - valM) * 0.25;
valS += (dbS - valS) * 0.05;

const getRMS = (b, vBuf) => {
    for(let i=0; i<b.length; i++) vBuf.push(Math.abs(b[i]));
    while(vBuf.length > vuWin) vBuf.shift();
    return vBuf.reduce((a,b)=>a+b,0)/vBuf.length;
};


     
        
        const targetL = dbToAngle(Math.max(-20, Math.min(3, 20 * Math.log10(getRMS(bufL, vuBufL) || 0.00001) + 23.8)));
        const targetR = dbToAngle(Math.max(-20, Math.min(3, 20 * Math.log10(getRMS(bufR, vuBufR) || 0.00001) + 23.8)));

        currentL += (targetL - currentL) * 0.145;
        currentR += (targetR - currentR) * 0.145;
        
        document.getElementById("ndlL").style.transform = `rotate(${90-currentL}deg)`;
        document.getElementById("ndlR").style.transform = `rotate(${90-currentR}deg)`;

        scopeCtx.fillStyle = "rgba(0, 10, 0, 0.18)"; scopeCtx.fillRect(0, 0, 220, 220);
        scopeCtx.strokeStyle = "#1a3a1a"; scopeCtx.beginPath(); scopeCtx.moveTo(110, 0); scopeCtx.lineTo(110, 220); scopeCtx.moveTo(0, 110); scopeCtx.lineTo(220, 110); scopeCtx.stroke();
        scopeCtx.beginPath(); scopeCtx.strokeStyle = "#00ff66"; scopeCtx.lineWidth = 1.2;
        
        for(let i=0; i<bufL.length; i+=2) {
            const rawX = (bufR[i] - bufL[i]) * sG * 40 + 110;
            const rawY = 110 - (bufL[i] + bufR[i]) * sG * 40;
            const targetX = lastX + (rawX - lastX) * 0.4;
            const targetY = lastY + (rawY - lastY) * 0.4;
            if(i===0) scopeCtx.moveTo(targetX, targetY); else scopeCtx.lineTo(targetX, targetY);
            lastX = targetX;
            lastY = targetY;
        }
        scopeCtx.stroke();
const hM = Math.max(0, Math.min(100, (valM + 60) * 1.6));
const hS = Math.max(0, Math.min(100, (valS + 60) * 1.6));

document.getElementById("barM").style.height = hM + "%";
document.getElementById("barS").style.height = hS + "%";

document.getElementById("lkfsVal").innerText = valS.toFixed(1) + " LKFS";
        
        requestAnimationFrame(loop);
    }
    loop();
};
    document.getElementById("lkfsStart").onclick = () => {
    bufM = [];
    bufS = [];
    valM = -60;
    valS = -60;
    lkfsOn = true;
};
</script>
</body>
</html>
