<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY - Physical Logic</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            background-color: #000; /* 漆黒（省エネ） */
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #play-button {
            width: 85vw;
            height: 55vh;
            background-color: #1a1a1a;
            border: 6px solid #333;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15vw;
            font-weight: bold;
            color: #444;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.1s;
        }

        /* 音源セット時：深い緑 */
        #play-button.ready {
            background-color: #004d00;
            border-color: #00cc00;
            color: #00cc00;
        }

        /* 物理ボタンで「Space」が押された瞬間の演出（溜め） */
        #play-button.pressing {
            background-color: #8b0000;
            transform: scale(0.92); /* ぐっと沈む */
        }

        /* 音が鳴る瞬間：鮮やかな赤 */
        #play-button.active {
            background-color: #ff0000 !important;
            border-color: #ffffff !important;
            color: #ffffff !important;
        }

        /* 1秒間のロック中：沈んだ赤 */
        #play-button.locking {
            background-color: #330000;
            border-color: #660000;
            color: #660000;
            cursor: default;
        }

        #controls { margin-top: 8vh; text-align: center; }
        input[type="file"] { display: none; }
        .file-label {
            display: inline-block;
            padding: 12px 24px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #888;
        }
        #status { margin-top: 15px; font-size: 13px; color: #666; letter-spacing: 0.1em; }
    </style>
</head>
<body>

    <div id="play-button">PLAY</div>

    <div id="controls">
        <label class="file-label">
            FILE SELECT
            <input type="file" id="file-input" accept="audio/*">
        </label>
        <div id="status">NO FILE</div>
    </div>

    <script>
        const playButton = document.getElementById('play-button');
        const fileInput = document.getElementById('file-input');
        const statusText = document.getElementById('status');
        
        let audioContext;
        let audioBuffer = null;
        let isLocking = false;
        let wakeLock = null;

        const DB_NAME = 'SamplerDB_Final';
        const STORE_NAME = 'Sounds';

        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
                request.onsuccess = (e) => resolve(e.target.result);
            });
        };

        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {}
        };

        const setupAudio = async (arrayBuffer) => {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            try {
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
                playButton.classList.add('ready');
                statusText.innerText = "STANDBY OK";
                requestWakeLock();
            } catch (e) { statusText.innerText = "LOAD ERROR"; }
        };

        const loadStoredSound = async () => {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).get('currentSE');
            req.onsuccess = () => { if (req.result) setupAudio(req.result); };
        };

        // --- ぐっと押し込んで鳴らすメインロジック ---
        const triggerSequence = () => {
            if (!audioBuffer || isLocking) return;
            if (audioContext.state === 'suspended') audioContext.resume();

            isLocking = true;
            
            // 1. まず沈み込む（演出開始）
            playButton.classList.add('pressing');

            // 2. 0.12秒後に音を発火！
            setTimeout(() => {
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);
                source.start(0);

                // 3. 画面を鮮やかな赤に
                playButton.classList.remove('pressing');
                playButton.classList.add('active');

                // 4. 演出を終わらせてロック状態へ
                setTimeout(() => {
                    playButton.classList.remove('active');
                    playButton.classList.add('locking');
                }, 150);

            }, 120); // 溜めの時間（120ミリ秒）

            // 5. 1秒後に完全復帰
            setTimeout(() => {
                isLocking = false;
                playButton.classList.remove('locking');
            }, 1000);
        };

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            statusText.innerText = "LOADING...";
            const arrayBuffer = await file.arrayBuffer();
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(arrayBuffer, 'currentSE');
            await setupAudio(arrayBuffer);
        });

        // 画面タップ・マウス操作
        const handleInteraction = (e) => {
            e.preventDefault();
            triggerSequence();
            if (!wakeLock) requestWakeLock();
        };

        playButton.addEventListener('touchstart', handleInteraction, {passive: false});
        playButton.addEventListener('mousedown', handleInteraction);

        // キーボード（スペースキー）対応
        window.addEventListener('keydown', (e) => {
            // スペースキーまたはエンターキーが押されたら発火
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault(); // 画面スクロールなどを防止
                triggerSequence();
                if (!wakeLock) requestWakeLock();
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') requestWakeLock();
        });

        loadStoredSound();
    </script>
</body>
</html>
