<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SE Sampler - PLAY</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            background-color: #000; /* 電池消費最小の黒 */
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* メインボタン：待機前はグレー */
        #play-button {
            width: 85vw;
            height: 55vh;
            background-color: #1a1a1a;
            border: 6px solid #333;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15vw;
            font-weight: bold;
            color: #444;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.05s;
        }

        /* 音源スタンバイ：緑色 */
        #play-button.ready {
            background-color: #006400; /* 暗めの緑（眩しすぎない） */
            border-color: #00ff00;
            color: #00ff00;
        }

        /* 再生中：鮮やかな赤 */
        #play-button.active {
            background-color: #ff0000 !important;
            border-color: #ffffff !important;
            color: #ffffff !important;
            transform: scale(0.96);
        }

        /* 1秒ロック中：沈んだ赤 */
        #play-button.locking {
            background-color: #4d0000; 
            border-color: #800000;
            color: #800000;
            cursor: default;
        }

        #controls {
            margin-top: 8vh;
            text-align: center;
        }
        input[type="file"] {
            display: none;
        }
        .file-label {
            display: inline-block;
            padding: 12px 24px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #888;
        }
        #status {
            margin-top: 15px;
            font-size: 13px;
            color: #666;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div id="play-button">PLAY</div>

    <div id="controls">
        <label class="file-label">
            FILE SELECT
            <input type="file" id="file-input" accept="audio/*">
        </label>
        <div id="status">NO FILE</div>
    </div>

    <script>
        const playButton = document.getElementById('play-button');
        const fileInput = document.getElementById('file-input');
        const statusText = document.getElementById('status');
        
        let audioContext;
        let audioBuffer = null;
        let isLocking = false;
        let wakeLock = null;

        const DB_NAME = 'SamplerDB_V2';
        const STORE_NAME = 'Sounds';

        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
                request.onsuccess = (e) => resolve(e.target.result);
            });
        };

        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        };

        const setupAudio = async (arrayBuffer) => {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            try {
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
                playButton.classList.add('ready');
                statusText.innerText = "STANDBY OK";
                requestWakeLock(); // スタンバイ完了時にロック開始
            } catch (e) {
                statusText.innerText = "LOAD ERROR";
            }
        };

        const loadStoredSound = async () => {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).get('currentSE');
            req.onsuccess = () => {
                if (req.result) setupAudio(req.result);
            };
        };

        const playSound = () => {
            if (!audioBuffer || isLocking) return;

            if (audioContext.state === 'suspended') audioContext.resume();

            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);
            source.start(0);

            isLocking = true;
            playButton.classList.add('active');
            
            setTimeout(() => {
                playButton.classList.remove('active');
                playButton.classList.add('locking');
            }, 100);

            setTimeout(() => {
                isLocking = false;
                playButton.classList.remove('locking');
            }, 1000);
        };

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            statusText.innerText = "LOADING...";
            const arrayBuffer = await file.arrayBuffer();
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(arrayBuffer, 'currentSE');
            await setupAudio(arrayBuffer);
        });

        const handleTrigger = (e) => {
            e.preventDefault();
            playSound();
            if (!wakeLock) requestWakeLock();
        };

        playButton.addEventListener('touchstart', handleTrigger, {passive: false});
        playButton.addEventListener('mousedown', handleTrigger);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') handleTrigger(e);
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') requestWakeLock();
        });

        loadStoredSound();
    </script>
</body>
</html>
