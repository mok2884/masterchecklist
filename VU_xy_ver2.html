<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Mobile Loudness Meter</title>

<style>

html, body{
    margin:0;
    padding:0;
    background:#050505;
    overflow:hidden;
    touch-action:none;
    font-family:Arial,sans-serif;
    color:#fff;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.console{
    width:100%;
    max-width:430px;
    height:100vh;
    box-sizing:border-box;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:14px;
    background:#111;
}

.top{
    display:flex;
    flex-direction:column;
    gap:10px;
}

select{
    width:100%;
    padding:12px;
    background:#222;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#333;
    color:white;
    font-size:18px;
    font-weight:bold;
}

button.on{
    background:#cc0000;
}

.mainMeter{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
}

.lufs{
    font-size:72px;
    font-weight:bold;
    line-height:1;
    letter-spacing:-3px;
}

.unit{
    font-size:26px;
    color:#aaa;
}

.barWrap{
    width:100%;
    height:36px;
    background:#222;
    border-radius:18px;
    overflow:hidden;
    border:1px solid #333;
}

.bar{
    width:0%;
    height:100%;
    background:linear-gradient(to right,#00aa44,#99ff00,#ffff00,#ff6600,#ff0000);
    transition:width 0.08s linear;
}

.row{
    display:flex;
    gap:10px;
}

.small{
    flex:1;
    background:#1a1a1a;
    border-radius:12px;
    padding:12px;
    text-align:center;
}

.smallLabel{
    color:#888;
    font-size:14px;
}

.smallValue{
    font-size:28px;
    margin-top:4px;
    font-weight:bold;
}

.scopeWrap{
    width:100%;
    height:220px;
    background:#000;
    border:1px solid #333;
    border-radius:12px;
    position:relative;
    overflow:hidden;
}

canvas{
    width:100%;
    height:100%;
}

.status{
    text-align:center;
    color:#0f0;
    font-size:14px;
}

.footer{
    text-align:center;
    color:#666;
    font-size:12px;
}

</style>
</head>
<body>

<div class="console">

    <div class="top">

        <select id="micSelect">
            <option value="">INPUT DEVICE</option>
        </select>

        <button id="btn">
            START
        </button>

    </div>

    <div class="mainMeter">

        <div class="lufs" id="lufsVal">
            -∞
        </div>

        <div class="unit">
            LUFS
        </div>

        <div class="barWrap">
            <div class="bar" id="loudBar"></div>
        </div>

    </div>

    <div class="row">

        <div class="small">
            <div class="smallLabel">PEAK</div>
            <div class="smallValue" id="peakVal">-∞</div>
        </div>

        <div class="small">
            <div class="smallLabel">MODE</div>
            <div class="smallValue" id="modeVal">--</div>
        </div>

    </div>

    <div class="scopeWrap">
        <canvas id="scope" width="400" height="220"></canvas>
    </div>

    <div class="status" id="status">
        READY
    </div>

    <div class="footer">
        MOBILE AUDIO METER
    </div>

</div>

<script>

const micSelect = document.getElementById("micSelect");
const btn = document.getElementById("btn");

const lufsVal = document.getElementById("lufsVal");
const loudBar = document.getElementById("loudBar");
const peakVal = document.getElementById("peakVal");
const modeVal = document.getElementById("modeVal");
const statusText = document.getElementById("status");

const scope = document.getElementById("scope");
const sctx = scope.getContext("2d");

let audioCtx;
let stream;
let analyserL;
let analyserR;

let monoMode = false;

let loudnessMemory = -60;

async function getDevices(){

    const devices = await navigator.mediaDevices.enumerateDevices();

    micSelect.innerHTML = "";

    devices
    .filter(d => d.kind === "audioinput")
    .forEach(d => {

        const opt = document.createElement("option");

        opt.value = d.deviceId;
        opt.text = d.label || "INPUT";

        micSelect.appendChild(opt);

    });

}

async function initDevices(){

    try{

        const tmp = await navigator.mediaDevices.getUserMedia({
            audio:true
        });

        tmp.getTracks().forEach(t => t.stop());

        await getDevices();

    }catch(e){

        console.log(e);

    }

}

initDevices();

btn.onclick = async () => {

    if(audioCtx){

        audioCtx.close();

        audioCtx = null;

        btn.classList.remove("on");
        btn.innerText = "START";

        statusText.innerText = "STOPPED";

        return;
    }

    try{

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        await audioCtx.resume();

        const constraints = {

            audio:{

                deviceId: micSelect.value
                    ? { exact: micSelect.value }
                    : undefined,

                channelCount:{ ideal:2 },

                echoCancellation:false,
                noiseSuppression:false,
                autoGainControl:false

            }

        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);

        const settings = stream.getAudioTracks()[0].getSettings();

        console.log(settings);

        monoMode = settings.channelCount === 1;

        modeVal.innerText = monoMode ? "MONO" : "ST";

        statusText.innerText =
            monoMode
            ? "MONO INPUT"
            : "STEREO INPUT";

        const src = audioCtx.createMediaStreamSource(stream);

        const splitter = audioCtx.createChannelSplitter(2);

        analyserL = audioCtx.createAnalyser();
        analyserR = audioCtx.createAnalyser();

        analyserL.fftSize = 512;
        analyserR.fftSize = 512;

        src.connect(splitter);

        splitter.connect(analyserL,0);
        splitter.connect(analyserR,1);

        btn.classList.add("on");
        btn.innerText = "STOP";

        draw();

    }catch(e){

        console.log(e);

        statusText.innerText = "INPUT ERROR";

    }

};

const bufL = new Float32Array(512);
const bufR = new Float32Array(512);

let lastFrame = 0;

function draw(t=0){

    if(!audioCtx) return;

    requestAnimationFrame(draw);

    if(t - lastFrame < 33) return;

    lastFrame = t;

    analyserL.getFloatTimeDomainData(bufL);

    if(!monoMode){

        analyserR.getFloatTimeDomainData(bufR);

    }else{

        bufR.set(bufL);

    }

    let peak = 0;
    let sum = 0;

    for(let i=0;i<bufL.length;i++){

        const l = bufL[i];
        const r = bufR[i];

        const mono = (l+r)*0.5;

        const abs = Math.abs(mono);

        if(abs > peak) peak = abs;

        sum += mono*mono;

    }

    const rms = Math.sqrt(sum / bufL.length);

    let db = 20 * Math.log10(rms + 0.0000001);

    let peakDb = 20 * Math.log10(peak + 0.0000001);

    db = Math.max(-60,Math.min(0,db));

    peakDb = Math.max(-60,Math.min(6,peakDb));

    loudnessMemory += (db - loudnessMemory) * 0.08;

    lufsVal.innerText = loudnessMemory.toFixed(1);

    peakVal.innerText = peakDb.toFixed(1);

    const percent = ((loudnessMemory + 60) / 60) * 100;

    loudBar.style.width = percent + "%";

    drawScope();

}

function drawScope(){

    sctx.fillStyle = "rgba(0,0,0,0.15)";
    sctx.fillRect(0,0,400,220);

    sctx.strokeStyle = "#113311";

    sctx.beginPath();

    sctx.moveTo(200,0);
    sctx.lineTo(200,220);

    sctx.moveTo(0,110);
    sctx.lineTo(400,110);

    sctx.stroke();

    sctx.beginPath();

    sctx.strokeStyle = "#00ff66";

    sctx.lineWidth = 1;

    let lastX = 200;
    let lastY = 110;

    for(let i=0;i<bufL.length;i+=4){

        let x,y;

        if(monoMode){

            x = (i / bufL.length) * 400;

            y = 110 - (bufL[i] * 80);

        }else{

            const rawX =
                (bufR[i] - bufL[i]) * 80 + 200;

            const rawY =
                110 - (bufL[i] + bufR[i]) * 40;

            x = lastX + (rawX - lastX) * 0.35;
            y = lastY + (rawY - lastY) * 0.35;

        }

        if(i===0){

            sctx.moveTo(x,y);

        }else{

            sctx.lineTo(x,y);

        }

        lastX = x;
        lastY = y;

    }

    sctx.stroke();

}

</script>

</body>
</html>
