<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <title>PTT MATRIX - peer.html</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif; text-align: center; 
            background: #1a1c1e; color: #fff; margin: 0; height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; user-select: none;
        }
        .header-panel { height: 22vh; background: #2c2e31; display: flex; flex-direction: column; }
        .top-controls { flex-grow: 1; display: flex; width: 100%; }
        .clock-box { 
            width: 66%; display: flex; align-items: center; justify-content: center; 
            font-family: 'Roboto Mono', monospace; font-size: 50px; color: #f1c40f;
            background: #111; border-right: 1px solid #444;
        }
        .config-box { width: 34%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ptt-area { 
            height: 56vh; width: 100%; background: #3a3f44;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold; color: #888;
            border-top: 4px solid #4a4f55; border-bottom: 4px solid #4a4f55;
            transition: background 0.1s; cursor: pointer;
        }
        #ptt-area.active { background: #e74c3c; color: #fff; }
        #ptt-area.locked { background: #d35400; color: #fff; }
        .footer-panel { height: 22vh; background: #2c2e31; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .safety-btn { padding: 12px; width: 85%; background: #4a4f55; border: 2px solid #666; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; }
        .safety-btn.active-lock { background: #d35400; border-color: #f39c12; }
        .tap-notice { font-size: 13px; color: #fff; background: #c0392b; padding: 3px 10px; border-radius: 4px; margin: 6px 0; font-weight: bold; }
        #status-display { font-size: 11px; color: #00ff00; background: #000; padding: 2px 0; height: 16px; overflow: hidden; }
        
        /* 役割表示ラベル */
        #role-label { font-size: 18px; color: #f1c40f; margin-bottom: 15px; font-weight: bold; }

        #keep-awake-video { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

<div id="status-display">待機中</div>

<video id="keep-awake-video" playsinline muted loop>
  <source src="https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp4" type="video/mp4">
</video>

<div class="header-panel">
    <div class="top-controls">
        <div class="clock-box" id="clock">00:00:00</div>
        <div class="config-box" onclick="tapAction('config')">
            <div class="tap-notice">5回タップ</div>
            <button class="safety-btn">回線設定</button>
        </div>
    </div>
</div>

<div id="ptt-area">
    <div id="role-label">未設定</div>
    <div id="ptt-text">PUSH TO TALK</div>
</div>

<div class="footer-panel">
    <div class="tap-notice">5回タップで切替</div>
    <button class="safety-btn" id="lock-btn" onclick="tapAction('lock')">マイク常時ON（固定）</button>
</div>

<!-- 設定パネル（URL指定がない場合の予備） -->
<div id="setup-panel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; padding:20px; box-sizing:border-box;">
    <h2 style="color:#f1c40f;">接続設定</h2>
    <select id="my-role" onchange="registerMe()" style="width:100%; padding:15px; margin-bottom:20px; font-size:18px;">
        <option value="">-- 自分を選択 --</option>
        <option value="sat-a">出先 A</option><option value="sat-b">出先 B</option>
        <option value="std-a">スタジオ A</option><option value="std-b">スタジオ B</option>
    </select>
    <select id="target-role" onchange="connectToTarget()" style="width:100%; padding:15px; margin-bottom:20px; font-size:18px;">
        <option value="">-- 相手を選択 --</option>
        <option value="sat-a">出先 A</option><option value="sat-b">出先 B</option>
        <option value="std-a">スタジオ A</option><option value="std-b">スタジオ B</option>
    </select>
    <button onclick="closePanel()" style="width:100%; padding:20px; background:#27ae60; color:#fff; border:none; border-radius:8px; font-size:18px;">設定を閉じる</button>
</div>

<script>
    let peer = null, localStream = null, isLocked = false, counters = { config: 0, lock: 0 }, wakeLock = null;
    let audioCtx = null, noiseGain = null;

    const idMap = { 'sat-a': 'lf-p-sa-v9x2u7k1w', 'sat-b': 'lf-p-sb-m4n5p8j3q', 'std-a': 'lf-p-sa-r1t2y6v9b', 'std-b': 'lf-p-sb-k8j9l0m4x' };
    const roleNames = { 'sat-a': '出先 A', 'sat-b': '出先 B', 'std-a': 'スタジオ A', 'std-b': 'スタジオ B' };

    const params = new URLSearchParams(window.location.search);
    const urlRole = params.get('role');

    function startVideoKeepAwake() {
        const video = document.getElementById('keep-awake-video');
        video.play().catch(() => {});
    }

    function initNoise() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const bufferSize = 2 * audioCtx.sampleRate, buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), output = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
        const noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer; noiseNode.loop = true;
        noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0;
        noiseNode.connect(noiseGain); noiseGain.connect(audioCtx.destination);
        noiseNode.start();
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
    }
    setInterval(updateClock, 1000); updateClock();

    async function requestWakeLock() {
        if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
    }

    function tapAction(type) {
        initNoise();
        requestWakeLock();
        startVideoKeepAwake();
        counters[type]++;
        if (counters[type] >= 5) {
            if (type === 'config') document.getElementById('setup-panel').style.display = 'block';
            if (type === 'lock') toggleLock();
            counters[type] = 0;
        }
        setTimeout(() => { counters[type] = 0; }, 1200);
    }

    function registerMe(manualValue = null) {
        const val = manualValue || document.getElementById('my-role').value;
        if (!val) return;
        
        document.getElementById('role-label').innerText = `【 ${roleNames[val]} 】`;
        document.getElementById('status-display').innerText = `待機中: ${roleNames[val]}`;
        
        initNoise();
        startVideoKeepAwake();
        if (peer) peer.destroy();
        
        peer = new Peer(idMap[val], { config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}});
        
        peer.on('open', () => { 
            if (urlRole && val.startsWith('sat')) {
                const target = val.replace('sat', 'std');
                setTimeout(() => connectToTarget(target), 2000);
            }
        });

        peer.on('call', async call => {
            if (!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({audio: true});
                localStream.getAudioTracks()[0].enabled = false;
            }
            call.answer(localStream);
            handleCall(call);
        });
    }

    async function connectToTarget(manualTarget = null) {
        const target = manualTarget || document.getElementById('target-role').value;
        if (!target || !peer) return;
        
        if (!localStream) {
            localStream = await navigator.mediaDevices.getUserMedia({audio: true});
            localStream.getAudioTracks()[0].enabled = false;
        }
        
        document.getElementById('status-display').innerText = `${roleNames[target]} を呼出中...`;
        const call = peer.call(idMap[target], localStream);
        handleCall(call);
    }

    function handleCall(call) {
        call.on('stream', stream => {
            const audio = new Audio(); audio.srcObject = stream; audio.play();
            document.getElementById('status-display').innerText = "接続済み (CONNECTED)";
            document.getElementById('status-display').style.color = "#00ffff";
        });
    }

    function setSideTone(active) {
        const role = urlRole || document.getElementById('my-role').value;
        if (role && role.startsWith('sat') && noiseGain) {
            noiseGain.gain.setTargetAtTime(active ? 0.015 : 0, audioCtx.currentTime, 0.05);
        }
    }

    function toggleLock() {
        if (!peer) return;
        isLocked = !isLocked;
        const ptt = document.getElementById('ptt-area');
        const pttText = document.getElementById('ptt-text');
        const btn = document.getElementById('lock-btn');
        if (isLocked) {
            ptt.classList.add('locked'); pttText.innerText = "送信固定中 (ON)";
            btn.classList.add('active-lock');
            if(localStream) localStream.getAudioTracks()[0].enabled = true;
            setSideTone(true);
        } else {
            ptt.classList.remove('locked'); pttText.innerText = "PUSH TO TALK";
            btn.classList.remove('active-lock');
            if(localStream) localStream.getAudioTracks()[0].enabled = false;
            setSideTone(false);
        }
    }

    const pttArea = document.getElementById('ptt-area');
    const startTalk = (e) => {
        initNoise(); startVideoKeepAwake();
        if (isLocked || !localStream) return;
        if (e.cancelable) e.preventDefault();
        localStream.getAudioTracks()[0].enabled = true;
        pttArea.classList.add('active'); document.getElementById('ptt-text').innerText = "送信中...";
        setSideTone(true);
    };
    const stopTalk = () => {
        if (isLocked || !localStream) return;
        localStream.getAudioTracks()[0].enabled = false;
        pttArea.classList.remove('active'); document.getElementById('ptt-text').innerText = "PUSH TO TALK";
        setSideTone(false);
    };

    pttArea.onmousedown = startTalk; pttArea.onmouseup = stopTalk;
    pttArea.ontouchstart = startTalk; pttArea.ontouchend = stopTalk;
    function closePanel() { document.getElementById('setup-panel').style.display = 'none'; }

    window.onload = () => {
        if (urlRole && idMap[urlRole]) {
            registerMe(urlRole);
        }
    };
</script>
</body>
</html>
