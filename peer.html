<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA用の全画面設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PTT MATRIX PROFESSIONAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            font-family: 'Courier New', monospace; text-align: center; background: #000; color: #fff; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none;
        }

        /* 5連打で開く設定パネル（最前面） */
        #setup-panel { 
            display: none; background: rgba(20, 20, 20, 0.95); padding: 20px; 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; box-sizing: border-box;
        }

        /* 画面構成：上部・中央・下部の3段 */
        .dead-zone { height: 20vh; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #222; }
        
        /* 中央：PTT帯 */
        #ptt-area { 
            height: 60vh; width: 100%;
            border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a;
            display: flex; align-items: center; justify-content: center;
            background: #050505; color: #1a1a1a; font-size: 32px; font-weight: bold;
            transition: all 0.1s; cursor: pointer;
        }
        #ptt-area.active { background: #400; color: #f00; border-color: #f00; }
        #ptt-area.locked { background: #600; color: #fff; border-color: #fff; box-shadow: inset 0 0 20px #f00; }

        /* TX HOLD ボタン（下部のデッドゾーン内に配置） */
        #lock-trigger { 
            width: 150px; height: 40px; border: 1px solid #111; border-radius: 4px;
            color: #111; line-height: 40px; font-size: 12px;
        }

        .info-bar { position: absolute; top: 20px; width: 100%; font-size: 12px; color: #444; pointer-events: none; }
    </style>
</head>
<body>

<div class="info-bar" id="status-display">INITIALIZING...</div>

<!-- 上部：5連打で設定を開く -->
<div class="dead-zone" id="config-trigger">ADMIN CONFIG</div>

<!-- 中央：PTT帯 -->
<div id="ptt-area">PUSH TO TALK</div>

<!-- 下部：5連打で常時ONロック -->
<div class="dead-zone">
    <div id="lock-trigger">TX HOLD (5-TAP)</div>
</div>

<div id="setup-panel">
    <h3>SYSTEM CONFIG</h3>
    <p style="font-size:12px;">【自分の役割】</p>
    <select id="my-role" onchange="handleRegister()">
        <option value="">-- SELECT --</option>
        <option value="sat-a">SAT-A (出先A)</option>
        <option value="sat-b">SAT-B (出先B)</option>
        <option value="std-a">STD-A (スタジオA)</option>
        <option value="std-b">STD-B (スタジオB)</option>
    </select>
    <p style="font-size:12px; margin-top:20px;">【接続先】</p>
    <select id="target-role" onchange="handleConnect()">
        <option value="">-- SELECT --</option>
        <option value="sat-a">SAT-A</option>
        <option value="sat-b">SAT-B</option>
        <option value="std-a">STD-A</option>
        <option value="std-b">STD-B</option>
    </select>
    <br><br>
    <button onclick="closePanel()" style="padding:15px; width:80%; background:#333; color:#fff; border:none;">CLOSE</button>
</div>

<script>
    let peer = null;
    let localStream = null;
    let isLocked = false;
    let clickCounts = { config: 0, lock: 0 };

    // カオスID
    const idMap = {
        'sat-a': 'lf-p-sa-v9x2u7k1w', 'sat-b': 'lf-p-sb-m4n5p8j3q',
        'std-a': 'lf-p-sa-r1t2y6v9b', 'std-b': 'lf-p-sb-k8j9l0m4x'
    };

    // 5連打カウンター（汎用）
    function multiTap(key, callback) {
        clickCounts[key]++;
        if (clickCounts[key] >= 5) {
            callback();
            clickCounts[key] = 0;
        }
        setTimeout(() => { clickCounts[key] = 0; }, 2000);
    }

    // 各種トリガー
    document.getElementById('config-trigger').onclick = () => multiTap('config', () => {
        document.getElementById('setup-panel').style.display = 'block';
    });

    document.getElementById('lock-trigger').onclick = () => multiTap('lock', toggleLock);

    function closePanel() { document.getElementById('setup-panel').style.display = 'none'; }

    // --- ここから下に実際の通信ロジックを実装していく ---
    // (registerMe, connectToTargetなどは前回のロジックを流用)

    function toggleLock() {
        if (!peer) return;
        isLocked = !isLocked;
        const ptt = document.getElementById('ptt-area');
        const trigger = document.getElementById('lock-trigger');
        
        if (isLocked) {
            ptt.classList.add('locked');
            ptt.innerText = "TX HOLDING";
            trigger.style.color = "#f00";
            trigger.style.borderColor = "#f00";
            if(localStream) localStream.getAudioTracks()[0].enabled = true;
        } else {
            ptt.classList.remove('locked');
            ptt.innerText = "PUSH TO TALK";
            trigger.style.color = "#111";
            trigger.style.borderColor = "#111";
            if(localStream) localStream.getAudioTracks()[0].enabled = false;
        }
    }

    // PTT操作 (マウス・タッチ両対応)
    const pttArea = document.getElementById('ptt-area');
    const startTalk = (e) => {
        if (isLocked || !localStream) return;
        e.preventDefault();
        localStream.getAudioTracks()[0].enabled = true;
        pttArea.classList.add('active');
        pttArea.innerText = "TALKING...";
    };
    const stopTalk = () => {
        if (isLocked || !localStream) return;
        localStream.getAudioTracks()[0].enabled = false;
        pttArea.classList.remove('active');
        pttArea.innerText = "PUSH TO TALK";
    };

    pttArea.onmousedown = startTalk;
    pttArea.onmouseup = stopTalk;
    pttArea.ontouchstart = startTalk;
    pttArea.ontouchend = stopTalk;
</script>
</body>
</html>
