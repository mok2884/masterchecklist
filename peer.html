<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTT - Universal Matrix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; text-align: center; background: #000; color: #fff; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none;
        }
        #setup-panel { 
            display: none; background: #222; padding: 20px; border-bottom: 2px solid #444;
            position: absolute; top: 0; width: 100%; z-index: 100; box-sizing: border-box;
        }
        /* 設定を出すための隠しエリア */
        .secret-trigger { padding: 15px; font-size: 12px; color: #111; cursor: pointer; }
        
        select { 
            padding: 15px; width: 100%; margin: 10px 0; border-radius: 8px; 
            background: #333; color: #fff; font-size: 18px; border: 1px solid #555;
        }

        #ptt-button { 
            flex-grow: 1; width: 100%; border: none;
            background: #111; color: #333; font-size: 40px; font-weight: bold;
            touch-action: none; cursor: pointer;
            transition: background 0.05s;
        }
        /* 押している時の色 */
        #ptt-button.active { background: #d32f2f !important; color: #fff !important; }
        #ptt-button:disabled { background: #050505; color: #111; cursor: not-allowed; }

        .info-bar { height: 50px; line-height: 50px; font-size: 16px; background: #111; border-top: 1px solid #333; }
        .active-status { color: #f1c40f; font-weight: bold; }
        .conn-status { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="secret-trigger" onclick="handleSecretClick()">ADMIN CONFIG (5-TAP)</div>

<div id="setup-panel">
    <div style="text-align:left; font-size:14px; color:#888;">【1. 自分の場所を登録】</div>
    <select id="my-role" onchange="registerMe()">
        <option value="">-- 自分を選択 --</option>
        <option value="sat-a">出先A</option>
        <option value="sat-b">出先B</option>
        <option value="std-a">スタジオA</option>
        <option value="std-b">スタジオB</option>
    </select>
    
    <div style="text-align:left; font-size:14px; color:#888; margin-top:15px;">【2. 接続先を選択】</div>
    <select id="target-role" onchange="connectToTarget()">
        <option value="">-- 相手を選択 --</option>
        <option value="sat-a">出先A</option>
        <option value="sat-b">出先B</option>
        <option value="std-a">スタジオA</option>
        <option value="std-b">スタジオB</option>
    </select>
    
    <button onclick="closePanel()" style="margin-top:20px; padding:15px; width:100%; background:#444; color:#fff; border:none; border-radius:5px; cursor:pointer;">設定完了</button>
</div>

<div class="info-bar" id="status-bar">役割を登録してください</div>

<button id="ptt-button" disabled>WAITING...</button>

<script>
    let peer = null;
    let localStream = null;
    let currentCall = null;
    let clickCount = 0;

    // IDは林さんの指示通り、適当なカオス文字列にしています
    const idMap = {
        'sat-a': 'lf-p-sat-a-v9x2u7k1w',
        'sat-b': 'lf-p-sat-b-m4n5p8j3q',
        'std-a': 'lf-p-std-a-r1t2y6v9b',
        'std-b': 'lf-p-std-b-k8j9l0m4x'
    };

    function handleSecretClick() {
        clickCount++;
        if (clickCount >= 5) {
            document.getElementById('setup-panel').style.display = 'block';
            clickCount = 0;
        }
        setTimeout(() => { clickCount = 0; }, 2000);
    }

    function closePanel() { document.getElementById('setup-panel').style.display = 'none'; }

    function registerMe() {
        const val = document.getElementById('my-role').value;
        if (!val) return;
        if (peer) peer.destroy();

        peer = new Peer(idMap[val], {
            config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
        });

        peer.on('open', () => {
            document.getElementById('status-bar').innerHTML = `自分: <span class="active-status">${val.toUpperCase()}</span> (待機中)`;
        });

        peer.on('call', async call => {
            localStream = await navigator.mediaDevices.getUserMedia({audio: true});
            localStream.getAudioTracks()[0].enabled = false;
            call.answer(localStream);
            setupCall(call);
        });
    }

    async function connectToTarget() {
        const targetVal = document.getElementById('target-role').value;
        if (!targetVal || !peer) return;
        if (currentCall) currentCall.close();

        try {
            localStream = await navigator.mediaDevices.getUserMedia({audio: true});
            localStream.getAudioTracks()[0].enabled = false;
            const call = peer.call(idMap[targetVal], localStream);
            setupCall(call);
        } catch (e) {
            console.error(e);
        }
    }

    function setupCall(call) {
        currentCall = call;
        call.on('stream', stream => {
            const audio = new Audio();
            audio.srcObject = stream;
            audio.play();
            document.getElementById('status-bar').innerHTML = `<span class="conn-status">CONNECTED</span>`;
            const ptt = document.getElementById('ptt-button');
            ptt.disabled = false;
            ptt.innerText = "PUSH TO TALK";
            ptt.style.color = "#888";
            ptt.style.background = "#1a1a1a";
        });
    }

    // PTT制御（スマホ・PC両対応）
    const pttBtn = document.getElementById('ptt-button');
    const startTalk = (e) => {
        if (e.cancelable) e.preventDefault();
        if (localStream && !pttBtn.disabled) {
            localStream.getAudioTracks()[0].enabled = true;
            pttBtn.innerText = "TALKING...";
            pttBtn.classList.add('active');
        }
    };
    const stopTalk = () => {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = false;
            pttBtn.innerText = "PUSH TO TALK";
            pttBtn.classList.remove('active');
        }
    };

    // スマホ用イベント
    pttBtn.addEventListener('touchstart', startTalk);
    pttBtn.addEventListener('touchend', stopTalk);
    
    // PC用イベント
    pttBtn.addEventListener('mousedown', startTalk);
    pttBtn.addEventListener('mouseup', stopTalk);
    pttBtn.addEventListener('mouseleave', stopTalk); // ボタンの外にマウスが逃げた時用
</script>
</body>
</html>
