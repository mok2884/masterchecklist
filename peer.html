<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>PTT MATRIX PRO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; 
            background: #1a1c1e; color: #fff; margin: 0; height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; user-select: none;
        }

        /* 上部・下部のグレーゾーン（操作の安全地帯） */
        .control-panel { 
            height: 22vh; background: #2c2e31; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px;
        }

        /* 中央：巨大なPTTボタン */
        #ptt-area { 
            height: 56vh; width: 100%; background: #3a3f44;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: bold; color: #888;
            border-top: 4px solid #4a4f55; border-bottom: 4px solid #4a4f55;
            transition: all 0.1s; cursor: pointer;
        }
        /* 押している時：鮮やかな赤 */
        #ptt-area.active { background: #e74c3c; color: #fff; border-color: #ff7675; }
        /* ロック時：深いオレンジ赤（点灯イメージ） */
        #ptt-area.locked { background: #d35400; color: #fff; border-color: #e67e22; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }

        /* 現場用ボタン：5連打が必要なボタン */
        .safety-btn {
            padding: 12px 24px; background: #4a4f55; border: 2px solid #5a5f65;
            border-radius: 8px; color: #bbb; font-size: 14px; font-weight: bold;
            box-shadow: 0 4px 0 #222; active { transform: translateY(2px); box-shadow: 0 2px 0 #222; }
        }
        .safety-btn.active-lock { background: #d35400; color: #fff; border-color: #e67e22; }

        /* 設定パネル（フルスクリーン） */
        #setup-panel { 
            display: none; background: rgba(0,0,0,0.9); padding: 30px; 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; box-sizing: border-box;
        }
        select { width: 100%; padding: 15px; margin: 15px 0; font-size: 18px; border-radius: 8px; background: #333; color: #fff; border: 1px solid #555; }
        
        .status-text { font-size: 12px; color: #00ff00; margin-bottom: 5px; letter-spacing: 1px; }
    </style>
</head>
<body>

<!-- 上部：設定エリア -->
<div class="control-panel">
    <div class="status-text" id="status-display">SYSTEM READY</div>
    <button class="safety-btn" onclick="tapAction('config')">CONFIG (5-TAPS)</button>
</div>

<!-- 中央：PTTメイン -->
<div id="ptt-area">PUSH TO TALK</div>

<!-- 下部：ロックエリア -->
<div class="control-panel">
    <button class="safety-btn" id="lock-btn" onclick="tapAction('lock')">DIRECT LIVE (5-TAPS)</button>
    <div style="font-size: 10px; color: #666;">※5回連続タップでモード切替</div>
</div>

<!-- 設定画面 -->
<div id="setup-panel">
    <h2 style="border-bottom: 1px solid #444; padding-bottom: 10px;">UNIT CONFIG</h2>
    <div style="text-align: left; margin-top: 20px;">
        <label>【MY ROLE / 自分の登録】</label>
        <select id="my-role" onchange="registerMe()">
            <option value="">-- SELECT --</option>
            <option value="sat-a">SAT-A (出先A)</option>
            <option value="sat-b">SAT-B (出先B)</option>
            <option value="std-a">STD-A (スタジオA)</option>
            <option value="std-b">STD-B (スタジオB)</option>
        </select>

        <label>【TARGET / 接続先】</label>
        <select id="target-role" onchange="connectToTarget()">
            <option value="">-- SELECT --</option>
            <option value="sat-a">SAT-A</option>
            <option value="sat-b">SAT-B</option>
            <option value="std-a">STD-A</option>
            <option value="std-b">STD-B</option>
        </select>
    </div>
    <button onclick="closePanel()" style="margin-top:40px; padding:20px; width:100%; background:#27ae60; color:#fff; border:none; border-radius:8px; font-size:18px; font-weight:bold;">DONE</button>
</div>

<script>
    let peer = null;
    let localStream = null;
    let currentCall = null;
    let isLocked = false;
    let counters = { config: 0, lock: 0 };

    const idMap = {
        'sat-a': 'lf-p-sa-v9x2u7k1w', 'sat-b': 'lf-p-sb-m4n5p8j3q',
        'std-a': 'lf-p-sa-r1t2y6v9b', 'std-b': 'lf-p-sb-k8j9l0m4x'
    };

    // 5連打判定ロジック
    function tapAction(type) {
        counters[type]++;
        if (counters[type] >= 5) {
            if (type === 'config') document.getElementById('setup-panel').style.display = 'block';
            if (type === 'lock') toggleLock();
            counters[type] = 0;
        }
        setTimeout(() => { counters[type] = 0; }, 1500);
    }

    function closePanel() { document.getElementById('setup-panel').style.display = 'none'; }

    // 自分の登録
    function registerMe() {
        const val = document.getElementById('my-role').value;
        if (!val) return;
        if (peer) peer.destroy();
        peer = new Peer(idMap[val], { config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}});
        peer.on('open', () => { document.getElementById('status-display').innerText = `ONLINE: ${val.toUpperCase()}`; });
        peer.on('call', async call => {
            localStream = await navigator.mediaDevices.getUserMedia({audio: true});
            localStream.getAudioTracks()[0].enabled = false;
            call.answer(localStream);
            handleCall(call);
        });
    }

    // 相手への接続
    async function connectToTarget() {
        const target = document.getElementById('target-role').value;
        if (!target || !peer) return;
        if (currentCall) currentCall.close();
        localStream = await navigator.mediaDevices.getUserMedia({audio: true});
        localStream.getAudioTracks()[0].enabled = false;
        const call = peer.call(idMap[target], localStream);
        handleCall(call);
    }

    function handleCall(call) {
        currentCall = call;
        call.on('stream', stream => {
            const audio = new Audio();
            audio.srcObject = stream; audio.play();
            document.getElementById('status-display').innerText = "CONNECTED";
            document.getElementById('ptt-area').style.color = "#eee";
        });
    }

    // DIRECT LIVE (常時ON) ロック
    function toggleLock() {
        if (!peer) return;
        isLocked = !isLocked;
        const ptt = document.getElementById('ptt-area');
        const btn = document.getElementById('lock-btn');
        if (isLocked) {
            ptt.classList.add('locked'); ptt.innerText = "DIRECT LIVE ON";
            btn.classList.add('active-lock');
            if(localStream) localStream.getAudioTracks()[0].enabled = true;
        } else {
            ptt.classList.remove('locked'); ptt.innerText = "PUSH TO TALK";
            btn.classList.remove('active-lock');
            if(localStream) localStream.getAudioTracks()[0].enabled = false;
        }
    }

    // PTT操作
    const pttArea = document.getElementById('ptt-area');
    const startTalk = (e) => {
        if (isLocked || !localStream) return;
        e.preventDefault();
        localStream.getAudioTracks()[0].enabled = true;
        pttArea.classList.add('active'); pttArea.innerText = "TALKING...";
    };
    const stopTalk = () => {
        if (isLocked || !localStream) return;
        localStream.getAudioTracks()[0].enabled = false;
        pttArea.classList.remove('active'); pttArea.innerText = "PUSH TO TALK";
    };

    pttArea.onmousedown = startTalk; pttArea.onmouseup = stopTalk;
    pttArea.ontouchstart = startTalk; pttArea.ontouchend = stopTalk;
</script>
</body>
</html>
